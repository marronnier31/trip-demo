# 로컬 기본 프로필
# - 별도 Oracle 설정 없이도 바로 실행/테스트 가능하게 H2 메모리 DB 사용
# - MODE=Oracle 로 두어 Oracle 문법 차이를 일부 완화

spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:tripzone;MODE=Oracle;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:create-drop}
