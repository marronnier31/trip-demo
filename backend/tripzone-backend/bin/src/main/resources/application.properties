spring.application.name=tripzone-backend
spring.config.import=optional:file:.env[.properties]

# 기본은 H2 local profile 로 두고, Oracle 연결 시 .env 에서 oracle 로 전환한다.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

server.port=${SERVER_PORT:8080}
server.servlet.session.cookie.name=${SESSION_COOKIE_NAME:TRIPZONESESSION}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:Lax}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.timeout=${SESSION_TIMEOUT:30m}

spring.jackson.time-zone=Asia/Seoul
spring.jpa.open-in-view=${JPA_OPEN_IN_VIEW:false}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}
spring.jpa.properties.hibernate.default_batch_fetch_size=${JPA_DEFAULT_BATCH_FETCH_SIZE:100}
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

# Oracle/H2 공통 로깅 기본값
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace

# WebConfig 에서 읽는 CORS 설정
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://localhost:5174}
