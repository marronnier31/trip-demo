# Oracle 연결 프로필
# 사용 전 .env 에서 SPRING_PROFILES_ACTIVE=oracle 로 변경
#
# 주의:
# - 현재 엔티티는 GenerationType.IDENTITY 를 사용 중이다.
# - Oracle 12c+ identity column 환경이면 그대로 사용 가능하다.
# - 구형 Oracle/시퀀스 전략으로 갈 경우 엔티티의 PK 생성 전략도 함께 바꿔야 한다.

spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:oracle.jdbc.OracleDriver}
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1521/FREEPDB1}
spring.datasource.username=${DB_USERNAME:tripzone}
spring.datasource.password=${DB_PASSWORD:tripzone}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.database-platform=${JPA_DATABASE_PLATFORM:org.hibernate.dialect.OracleDialect}

# 필요 시 기본 스키마를 고정한다.
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:TRIPZONE}
