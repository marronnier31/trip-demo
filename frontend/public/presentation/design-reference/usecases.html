<!DOCTYPE html>

  <body>

      <header class="sub-hero">
        <a class="back-link" href="./roles.html">← 역할별 구조 보기</a>
        <p class="eyebrow">Usecase Maps</p>
        <h1>역할별 흐름도</h1>
        <p class="hero-desc">한 페이지에 몰아넣지 않고 역할별로 분리했습니다. 비교는 역할 단위로 보는 편이 더 읽기 쉽습니다.</p>
      </header>

      <main class="content">
        <section class="section-card">
          <div class="doc-grid">
            <a class="doc-link-card" href="./user-flow.html">
              <span class="doc-link-index">01</span>
              <strong>일반 사용자 흐름도</strong>
              <p>탐색, 계정, 숙소 예약, 마이페이지 흐름을 별도 캔버스로 정리했습니다.</p>

            </a>

              <span class="doc-link-index">03</span>
              <strong>관리자 흐름도</strong>
