<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>TripZone ERD — Clean</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(circle at top, rgba(36, 72, 120, 0.22), transparent 34%),
      #0d1117;
    font-family: 'SF Mono', 'JetBrains Mono', 'Pretendard', 'Courier New', monospace;
  }
  #header {
    padding: 18px 28px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #header h1 {
    color: #e6edf3;
    font-size: 28px;
    letter-spacing: 1px;
    font-weight: bold;
  }
  #header .sub {
    color: #8b949e;
    font-size: 17px;
  }
  #legend {
    display: flex;
    gap: 20px;
    margin-left: auto;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 16px;
    color: #8b949e;
  }
  .legend-dot {
    width: 12px; height: 12px; border-radius: 2px;
  }
  #wrapper {
    overflow: auto;
    padding: 28px;
  }
</style>
</head>
<body>
<div id="header">
  <h1>🏨 TripZone ERD</h1>
  <span class="sub">Entity Relationship Diagram</span>

    <div class="legend-item"><div class="legend-dot" style="background:#ffd700"></div>PK</div>
    <div class="legend-item"><div class="legend-dot" style="background:#7dd3fc"></div>FK</div>
    <div class="legend-item"><div class="legend-dot" style="background:#86efac"></div>UK</div>
  </div>
</div>
<div id="wrapper">
  <svg id="erd" xmlns="http://www.w3.org/2000/svg"></svg>
</div>
<script>
const TW = 380;      // table width
const HH = 52;       // header height
const FH = 38;       // field row height
const PAD = 14;

            ['VARCHAR2','ADDRESS',''],['VARCHAR2','STATUS','']]},

  BOOKINGS: { color:'#f87171', bg:'#200808',
    fields:[['NUMBER','BOOKING_NO','PK'],['NUMBER','USER_NO','FK'],['NUMBER','LODGING_NO','FK'],
            ['NUMBER','USER_COUPON_NO','FK'],['DATE','CHECK_IN_DATE',''],
            ['DATE','CHECK_OUT_DATE',''],['NUMBER','GUEST_COUNT',''],
            ['NUMBER','TOTAL_PRICE',''],['VARCHAR2','STATUS','']]},

  WISHLIST: { color:'#93c5fd', bg:'#081428',
    fields:[['NUMBER','WISHLIST_NO','PK'],['NUMBER','USER_NO','FK'],['NUMBER','LODGING_NO','FK']]},

  LODGINGS_IMAGE: { color:'#fcd34d', bg:'#1a1600',
    fields:[['NUMBER','IMAGE_NO','PK'],['NUMBER','LODGING_NO','FK'],['VARCHAR2','IMAGE_URL',''],
            ['CHAR','IS_THUMBNAIL',''],['NUMBER','SORT_ORDER','']]},

  INQUIRY_ROOM: { color:'#fde68a', bg:'#1c1800',
    fields:[['NUMBER','INQUIRY_NO','PK'],['NUMBER','USER_NO','FK'],['VARCHAR2','TARGET_TYPE',''],
            ['VARCHAR2','INQUIRY_TYPE',''],['VARCHAR2','TITLE',''],
            ['NUMBER','ADMIN_USER_NO','FK'],['NUMBER','LODGING_NO','FK'],['VARCHAR2','STATUS','']]},

  REVIEW: { color:'#bef264', bg:'#121c00',
    fields:[['NUMBER','REVIEW_NO','PK'],['NUMBER','BOOKING_NO','FK'],['NUMBER','USER_NO','FK'],
            ['NUMBER','LODGING_NO','FK'],['NUMBER','RATING',''],['VARCHAR2','CONTENT','']]},

  INQUIRY_MESSAGE: { color:'#fda4af', bg:'#200610',
    fields:[['NUMBER','MESSAGE_NO','PK'],['NUMBER','INQUIRY_NO','FK'],['NUMBER','SENDER_USER_NO','FK'],
            ['VARCHAR2','SENDER_TYPE',''],['VARCHAR2','MESSAGE_CONTENT',''],['CHAR','READ_YN','']]},

  PAYMENT: { color:'#6ee7b7', bg:'#042016',
    fields:[['NUMBER','PAYMENT_NO','PK'],['NUMBER','BOOKING_NO','FK'],['NUMBER','ORDER_ID','UK'],
            ['VARCHAR2','PAYMENT_KEY','UK'],['VARCHAR2','PG_PROVIDER',''],
            ['NUMBER','PAYMENT_AMOUNT',''],['VARCHAR2','PAYMENT_METHOD',''],
            ['VARCHAR2','PAYMENT_STATUS','']]},

  MILEAGE_HISTORY: { color:'#818cf8', bg:'#0c0c28',
    fields:[['NUMBER','MILEAGE_HISTORY_NO','PK'],['NUMBER','USER_NO','FK'],['NUMBER','BOOKING_NO','FK'],
            ['NUMBER','PAYMENT_NO','FK'],['VARCHAR2','CHANGE_TYPE',''],['NUMBER','CHANGE_AMOUNT',''],
            ['NUMBER','BALANCE_AFTER',''],['VARCHAR2','STATUS','']]},
};

function th(name) { return HH + TABLES[name].fields.length * FH; }

// ──────────────────────────────────────────
// Layout: expanded 5-column grid with clearer lanes
// ──────────────────────────────────────────
const C0=60, C1=540, C2=1020, C3=1500, C4=1980;
const R0=60, R1=500, R2=980, R3=1460, R4=1940, R5=2420, R6=2900;

const POS = {
  MEMBER_GRADE:      {x:C2, y:R0},
  PERSISTENT_LOGINS: {x:C4, y:R0},
  MEMBER_AUTH:       {x:C0, y:R1},
  USERS:             {x:C2, y:R1},
  EVENT:             {x:C0, y:R2},
  HOST_PROFILE:      {x:C1, y:R2},
  COUPON:            {x:C3, y:R2},
  USER_COUPON:       {x:C4, y:R2},
  EVENT_COUPON:      {x:C1, y:R3},
  LODGINGS:          {x:C2, y:R3},
  INQUIRY_ROOM:      {x:C3, y:R3},
  BOOKINGS:          {x:C4, y:R3},
  WISHLIST:          {x:C0, y:R4},
  LODGINGS_IMAGE:    {x:C1, y:R4},
  INQUIRY_MESSAGE:   {x:C3, y:R4},
  PAYMENT:           {x:C4, y:R4},
  REVIEW:            {x:C0, y:R5},
  MILEAGE_HISTORY:   {x:C4, y:R5},
};

function anc(name, side, frac=0.5) {
  const p = POS[name], h = th(name);
  const cx = p.x + TW/2, ry = p.y + HH + (h-HH)*frac;
  switch(side){
    case 'top':    return {x: p.x + TW*frac, y: p.y};
    case 'bottom': return {x: p.x + TW*frac, y: p.y + h};
    case 'left':   return {x: p.x,      y: ry};
    case 'right':  return {x: p.x + TW, y: ry};
  }
}

function moveOut(point, side, dist = 30) {
  switch (side) {
    case 'top': return { x: point.x, y: point.y - dist };
    case 'bottom': return { x: point.x, y: point.y + dist };
    case 'left': return { x: point.x - dist, y: point.y };
    case 'right': return { x: point.x + dist, y: point.y };
    default: return point;
  }
}

function pointsToPath(points) {
  return points.map((point, index) => `${index === 0 ? 'M' : 'L'}${point.x} ${point.y}`).join(' ');
}

function route(s, ss, t, ts, conn = {}) {
  const start = moveOut(s, ss, conn.outStart || 28);
  const end = moveOut(t, ts, conn.outEnd || 28);
  const points = [s, start];

  if (typeof conn.viaX === 'number') {
    points.push({ x: conn.viaX, y: start.y });
    points.push({ x: conn.viaX, y: end.y });
  } else if (typeof conn.viaY === 'number') {
    points.push({ x: start.x, y: conn.viaY });
    points.push({ x: end.x, y: conn.viaY });
  } else if (Array.isArray(conn.via)) {
    conn.via.forEach((point) => points.push(point));
  } else {
  const hS = ss==='left'||ss==='right';
  const hT = ts==='left'||ts==='right';
  if (!hS && !hT) { // both vert exits
      const my = conn.midY ?? ((start.y + end.y) / 2);
      points.push({ x: start.x, y: my });
      points.push({ x: end.x, y: my });
    } else if (hS && hT) { // both horiz exits
      const mx = conn.midX ?? ((start.x + end.x) / 2);
      points.push({ x: mx, y: start.y });
      points.push({ x: mx, y: end.y });
    } else if (hS && !hT) {
      points.push({ x: end.x, y: start.y });
    } else {
      points.push({ x: start.x, y: end.y });
    }
  }

  points.push(end, t);
  return { d: pointsToPath(points), points };
}

// ──────────────────────────────────────────
// Connections
// ──────────────────────────────────────────
const CONNS = [
  // ── User / Auth ──────────────────────────────────────────────────────────
  {f:'MEMBER_GRADE',   fs:'bottom', ff:0.5,  t:'USERS',          ts:'top',    tf:0.5,  lbl:'assigns',   clr:'#a78bfa'},
  {f:'USERS',          fs:'left',   ff:0.35, t:'MEMBER_AUTH',    ts:'right',  tf:0.5,  lbl:'has',       clr:'#fb923c', viaX: 420},
  {f:'USERS',          fs:'right',  ff:0.25, t:'PERSISTENT_LOGINS',ts:'left', tf:0.5, lbl:'',          clr:'#fbbf24', viaY: 640},

  // ── Host & Lodging ───────────────────────────────────────────────────────
  {f:'USERS',          fs:'bottom', ff:0.38, t:'HOST_PROFILE',   ts:'top',    tf:0.5,  lbl:'owns',      clr:'#a78bfa', viaX: 760},
  {f:'HOST_PROFILE',   fs:'bottom', ff:0.5,  t:'LODGINGS',       ts:'top',    tf:0.4,  lbl:'linked_to', clr:'#06b6d4'},
  {f:'LODGINGS',       fs:'bottom', ff:0.5,  t:'LODGINGS_IMAGE', ts:'top',    tf:0.5,  lbl:'has',       clr:'#fcd34d'},
  {f:'LODGINGS',       fs:'left',   ff:0.6,  t:'WISHLIST',       ts:'right',  tf:0.5,  lbl:'',          clr:'#93c5fd', viaX: 780},

  // ── Event / Coupon ───────────────────────────────────────────────────────
  {f:'USERS',          fs:'left',   ff:0.55, t:'EVENT',          ts:'top',    tf:0.5,  lbl:'publishes', clr:'#f472b6', viaX: 300},
  {f:'USERS',          fs:'bottom', ff:0.62, t:'COUPON',         ts:'top',    tf:0.5,  lbl:'issues',    clr:'#34d399', viaX: 1320},
  {f:'EVENT',          fs:'bottom', ff:0.5,  t:'EVENT_COUPON',   ts:'left',   tf:0.25, lbl:'saves',     clr:'#22d3ee', viaY: 1390},
  {f:'COUPON',         fs:'bottom', ff:0.3,  t:'EVENT_COUPON',   ts:'right',  tf:0.25, lbl:'',          clr:'#22d3ee', viaY: 1390},
  {f:'COUPON',         fs:'right',  ff:0.5,  t:'USER_COUPON',    ts:'left',   tf:0.35, lbl:'',          clr:'#c084fc'},
  {f:'EVENT_COUPON',   fs:'top',    ff:0.8,  t:'USER_COUPON',    ts:'bottom', tf:0.3,  lbl:'sends',     clr:'#c084fc', viaX: 1880},
  {f:'USERS',          fs:'right',  ff:0.45, t:'USER_COUPON',    ts:'top',    tf:0.5,  lbl:'',          clr:'#c084fc', viaX: 1800},

  // ── Booking ──────────────────────────────────────────────────────────────
  {f:'USERS',          fs:'right',  ff:0.65, t:'BOOKINGS',       ts:'top',    tf:0.3,  lbl:'books',     clr:'#f87171', viaX: 1800},
  {f:'LODGINGS',       fs:'right',  ff:0.5,  t:'BOOKINGS',       ts:'left',   tf:0.35, lbl:'receives',  clr:'#f87171'},
  {f:'USER_COUPON',    fs:'bottom', ff:0.5,  t:'BOOKINGS',       ts:'top',    tf:0.7,  lbl:'applies',   clr:'#c084fc'},
  {f:'USERS',          fs:'left',   ff:0.75, t:'WISHLIST',       ts:'top',    tf:0.5,  lbl:'gets',      clr:'#93c5fd', viaX: 220},

  // ── Review ───────────────────────────────────────────────────────────────
  {f:'BOOKINGS',       fs:'bottom', ff:0.3,  t:'REVIEW',         ts:'right',  tf:0.4,  lbl:'',          clr:'#bef264', viaY: 2690},
  {f:'LODGINGS',       fs:'bottom', ff:0.2,  t:'REVIEW',         ts:'right',  tf:0.6,  lbl:'',          clr:'#bef264', viaX: 840},
  {f:'USERS',          fs:'left',   ff:0.88, t:'REVIEW',         ts:'top',    tf:0.5,  lbl:'writes',    clr:'#bef264', viaX: 300},

  // ── Inquiry ──────────────────────────────────────────────────────────────
  {f:'LODGINGS',       fs:'right',  ff:0.7,  t:'INQUIRY_ROOM',   ts:'left',   tf:0.65, lbl:'relates_to',clr:'#fde68a'},
  {f:'USERS',          fs:'right',  ff:0.75, t:'INQUIRY_ROOM',   ts:'top',    tf:0.35, lbl:'',          clr:'#fde68a', viaX: 1360},
  {f:'INQUIRY_ROOM',   fs:'bottom', ff:0.5,  t:'INQUIRY_MESSAGE',ts:'top',    tf:0.5,  lbl:'contains',  clr:'#fda4af'},

  // ── Payment & Mileage ────────────────────────────────────────────────────
  {f:'BOOKINGS',       fs:'bottom', ff:0.55, t:'PAYMENT',        ts:'top',    tf:0.45, lbl:'paid_by',   clr:'#6ee7b7'},
  {f:'BOOKINGS',       fs:'bottom', ff:0.7,  t:'MILEAGE_HISTORY',ts:'top',    tf:0.35, lbl:'',          clr:'#818cf8', viaX: 2060},
  {f:'PAYMENT',        fs:'bottom', ff:0.5,  t:'MILEAGE_HISTORY',ts:'top',    tf:0.65, lbl:'affects',   clr:'#818cf8'},
  {f:'USERS',          fs:'right',  ff:0.85, t:'MILEAGE_HISTORY',ts:'top',    tf:0.2,  lbl:'',          clr:'#818cf8', viaX: 1700},
];

// ──────────────────────────────────────────
// Render
// ──────────────────────────────────────────
const svg = document.getElementById('erd');
const CW = 2440, CH = 3220;
svg.setAttribute('width',  '100%');
svg.setAttribute('height', 'auto');
svg.style.maxWidth = CW + 'px';
svg.setAttribute('viewBox',`0 0 ${CW} ${CH}`);

// ── Defs ──────────────────────────────────
const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
defs.innerHTML = `
  <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
    <path d="M0,0 L7,3 L0,6 Z" fill="#556" opacity="0.9"/>
  </marker>
  <marker id="crow" markerWidth="10" markerHeight="8" refX="1" refY="4" orient="auto">
    <line x1="9" y1="0" x2="1" y2="4" stroke="#556" stroke-width="1.2"/>
    <line x1="9" y1="8" x2="1" y2="4" stroke="#556" stroke-width="1.2"/>
    <line x1="9" y1="0" x2="9" y2="8" stroke="#556" stroke-width="1.2"/>
    <line x1="6" y1="0" x2="6" y2="8" stroke="#556" stroke-width="1.2"/>
  </marker>
`;
svg.appendChild(defs);

// ── Grid bg lines ─────────────────────────
const bgG = document.createElementNS('http://www.w3.org/2000/svg','g');
bgG.setAttribute('opacity','0.035');
for(let x=0;x<=CW;x+=40){
  const l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',x);l.setAttribute('y1',0);
  l.setAttribute('x2',x);l.setAttribute('y2',CH);
  l.setAttribute('stroke','#8b949e');l.setAttribute('stroke-width','0.5');
  bgG.appendChild(l);
}
for(let y=0;y<=CH;y+=40){
  const l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',0);l.setAttribute('y1',y);
  l.setAttribute('x2',CW);l.setAttribute('y2',y);
  l.setAttribute('stroke','#8b949e');l.setAttribute('stroke-width','0.5');
  bgG.appendChild(l);
}
svg.appendChild(bgG);

// ── Connections ───────────────────────────
const connG = document.createElementNS('http://www.w3.org/2000/svg','g');
for(const c of CONNS){
  const s = anc(c.f, c.fs, c.ff);
  const t = anc(c.t, c.ts, c.tf);
  const routed = route(s, c.fs, t, c.ts, c);
  const d = routed.d;

  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', d);
  path.setAttribute('fill','none');
  path.setAttribute('stroke', c.clr);
  path.setAttribute('stroke-width','2.4');
  path.setAttribute('stroke-linejoin','round');
  path.setAttribute('stroke-linecap','round');
  path.setAttribute('stroke-opacity','0.72');
  path.setAttribute('marker-end','url(#arr)');
  connG.appendChild(path);

  if(c.lbl){
    const midPoint = routed.points[Math.floor(routed.points.length / 2)];
    const mx = midPoint.x;
    const my = midPoint.y;
    const bg = document.createElementNS('http://www.w3.org/2000/svg','rect');
    const tw_ = c.lbl.length*8.4+18;
    bg.setAttribute('x', mx-tw_/2);
    bg.setAttribute('y', my-13);
    bg.setAttribute('width',tw_);
    bg.setAttribute('height',20);
    bg.setAttribute('rx',6);
    bg.setAttribute('fill','#0d1117');
    bg.setAttribute('stroke', c.clr);
    bg.setAttribute('stroke-opacity','0.45');
    bg.setAttribute('opacity','0.92');
    connG.appendChild(bg);

    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x', mx);
    txt.setAttribute('y', my+2);
    txt.setAttribute('text-anchor','middle');
    txt.setAttribute('font-size','13');
    txt.setAttribute('font-weight','700');
    txt.setAttribute('font-family','SF Mono, JetBrains Mono, monospace');
    txt.setAttribute('fill', c.clr);
    txt.setAttribute('opacity','1');
    txt.textContent = c.lbl;
    connG.appendChild(txt);
  }
}
svg.appendChild(connG);

// ── Tables ────────────────────────────────
const tabG = document.createElementNS('http://www.w3.org/2000/svg','g');

for(const [name, tbl] of Object.entries(TABLES)){
  const p = POS[name];
  if(!p) continue;
  const h = th(name);
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('transform',`translate(${p.x},${p.y})`);

  // Drop shadow
  const sh = document.createElementNS('http://www.w3.org/2000/svg','rect');
  sh.setAttribute('x',3);sh.setAttribute('y',4);
  sh.setAttribute('width',TW);sh.setAttribute('height',h);
  sh.setAttribute('rx',12);sh.setAttribute('fill','#000');sh.setAttribute('opacity','0.28');
  g.appendChild(sh);

  // Body
  const body = document.createElementNS('http://www.w3.org/2000/svg','rect');
  body.setAttribute('width',TW);body.setAttribute('height',h);
  body.setAttribute('rx',12);
  body.setAttribute('fill',tbl.bg);
  body.setAttribute('stroke',tbl.color);body.setAttribute('stroke-width','1.8');
  g.appendChild(body);

  // Header fill
  const hdr = document.createElementNS('http://www.w3.org/2000/svg','rect');
  hdr.setAttribute('width',TW);hdr.setAttribute('height',HH);
  hdr.setAttribute('rx',12);hdr.setAttribute('fill',tbl.color);hdr.setAttribute('opacity','0.92');
  g.appendChild(hdr);
  // flatten header bottom corners
  const hdrFix = document.createElementNS('http://www.w3.org/2000/svg','rect');
  hdrFix.setAttribute('y',HH-5);hdrFix.setAttribute('width',TW);hdrFix.setAttribute('height',5);
  hdrFix.setAttribute('fill',tbl.color);hdrFix.setAttribute('opacity','0.9');
  g.appendChild(hdrFix);

  // Header label
  const htxt = document.createElementNS('http://www.w3.org/2000/svg','text');
  htxt.setAttribute('x',TW/2);htxt.setAttribute('y',HH/2+9);
  htxt.setAttribute('text-anchor','middle');
  htxt.setAttribute('font-size','20');htxt.setAttribute('font-weight','800');
  htxt.setAttribute('font-family','SF Mono, JetBrains Mono, monospace');
  htxt.setAttribute('fill','#06080a');
  htxt.setAttribute('letter-spacing','0.2');
  htxt.textContent = name;
  g.appendChild(htxt);

  // Fields
  tbl.fields.forEach(([type,fname,key],i)=>{
    const fy = HH + i*FH;

    // Separator
    if(i>0){
      const sep = document.createElementNS('http://www.w3.org/2000/svg','line');
      sep.setAttribute('x1',0);sep.setAttribute('y1',fy);
      sep.setAttribute('x2',TW);sep.setAttribute('y2',fy);
      sep.setAttribute('stroke','#ffffff14');sep.setAttribute('stroke-width','0.8');
      g.appendChild(sep);
    }

    // Row highlight for PK
    if(key==='PK'){
      const rb = document.createElementNS('http://www.w3.org/2000/svg','rect');
      rb.setAttribute('y',fy);rb.setAttribute('width',TW);rb.setAttribute('height',FH);
      rb.setAttribute('fill','#ffffff0d');
      g.appendChild(rb);
    }

    // Type label
    const ty_txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    ty_txt.setAttribute('x',PAD);ty_txt.setAttribute('y',fy+FH/2+7);
    ty_txt.setAttribute('font-size','13');ty_txt.setAttribute('font-family','SF Mono, JetBrains Mono, monospace');
    ty_txt.setAttribute('fill','#5f7390');
    ty_txt.textContent = type;
    g.appendChild(ty_txt);

    // Field name
    const fn_txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    fn_txt.setAttribute('x',PAD+110);fn_txt.setAttribute('y',fy+FH/2+7);
    fn_txt.setAttribute('font-size','17');fn_txt.setAttribute('font-weight','700');
    fn_txt.setAttribute('font-family','SF Mono, JetBrains Mono, monospace');
    fn_txt.setAttribute('fill', key==='PK'?'#ffd700':key==='FK'?'#7dd3fc':key==='UK'?'#86efac':'#c0cdd8');
    fn_txt.textContent = fname;
    g.appendChild(fn_txt);

    // Key badge
    if(key){
      const kclr = key==='PK'?'#ffd700':key==='FK'?'#7dd3fc':'#86efac';
      const kb = document.createElementNS('http://www.w3.org/2000/svg','rect');
      const kw=28;
      kb.setAttribute('x',TW-kw-8);kb.setAttribute('y',fy+5);
      kb.setAttribute('width',kw);kb.setAttribute('height',FH-10);
      kb.setAttribute('rx',5);kb.setAttribute('fill',kclr);kb.setAttribute('opacity','0.16');
      g.appendChild(kb);

      const kt = document.createElementNS('http://www.w3.org/2000/svg','text');
      kt.setAttribute('x',TW-kw/2-8);kt.setAttribute('y',fy+FH/2+6);
      kt.setAttribute('text-anchor','middle');
      kt.setAttribute('font-size','11');kt.setAttribute('font-weight','800');
      kt.setAttribute('font-family','SF Mono, JetBrains Mono, monospace');
      kt.setAttribute('fill',kclr);
      kt.textContent = key;
      g.appendChild(kt);
    }
  });

  tabG.appendChild(g);
}

svg.appendChild(tabG);
</script>
