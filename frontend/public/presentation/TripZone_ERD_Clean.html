<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>TripZone ERD — Clean</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    font-family: 'Courier New', Courier, monospace;
  }
  #header {
    padding: 14px 24px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #header h1 {
    color: #e6edf3;
    font-size: 24px;
    letter-spacing: 2px;
    font-weight: bold;
  }
  #header .sub {
    color: #8b949e;
    font-size: 16px;
  }
  #legend {
    display: flex;
    gap: 20px;
    margin-left: auto;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 15px;
    color: #8b949e;
  }
  .legend-dot {
    width: 12px; height: 12px; border-radius: 2px;
  }
  #wrapper {
    overflow: auto;
    padding: 24px;
  }
</style>
</head>
<body>
<div id="header">
  <h1>🏨 TripZone ERD</h1>
  <span class="sub">Entity Relationship Diagram</span>
  <div id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#ffd700"></div>PK</div>
    <div class="legend-item"><div class="legend-dot" style="background:#7dd3fc"></div>FK</div>
    <div class="legend-item"><div class="legend-dot" style="background:#86efac"></div>UK</div>
  </div>
</div>
<div id="wrapper">
  <svg id="erd" xmlns="http://www.w3.org/2000/svg"></svg>
</div>
<script>
const TW = 340;      // table width
const HH = 44;       // header height
const FH = 34;       // field row height
const PAD = 10;

const TABLES = {
  MEMBER_GRADE: { color:'#e879f9', bg:'#1e0a2a',
    fields:[['NUMBER','GRADE_NO','PK'],['VARCHAR2','GRADE_CODE','UK'],['VARCHAR2','GRADE_NAME',''],
            ['NUMBER','MIN_TOTAL_AMOUNT',''],['NUMBER','MIN_STAY_COUNT',''],
            ['NUMBER','MILEAGE_RATE',''],['VARCHAR2','STATUS','']]},

  PERSISTENT_LOGINS: { color:'#fbbf24', bg:'#1e1800',
    fields:[['VARCHAR2','USERNAME',''],['VARCHAR2','SERIES','PK'],
            ['VARCHAR2','TOKEN',''],['TIMESTAMP','LAST_USED','']]},

  USERS: { color:'#38bdf8', bg:'#061828',
    fields:[['NUMBER','USER_NO','PK'],['VARCHAR2','USER_ID','UK'],['VARCHAR2','USER_NAME',''],
            ['VARCHAR2','PHONE',''],['NUMBER','GRADE_NO','FK'],['NUMBER','MILEAGE',''],
            ['VARCHAR2','EMAIL','UK'],['CHAR','ENABLED','']]},

  MEMBER_AUTH: { color:'#fb923c', bg:'#1e0e00',
    fields:[['NUMBER','USER_NO','FK'],['VARCHAR2','AUTH','']]},

  EVENT: { color:'#f472b6', bg:'#200a18',
    fields:[['NUMBER','EVENT_NO','PK'],['NUMBER','ADMIN_USER_NO','FK'],['VARCHAR2','TITLE',''],
            ['VARCHAR2','EVENT_STATUS',''],['DATE','START_DATE',''],['DATE','END_DATE','']]},

  HOST_PROFILE: { color:'#a78bfa', bg:'#120a28',
    fields:[['NUMBER','HOST_NO','PK'],['NUMBER','USER_NO','FK'],['VARCHAR2','BUSINESS_NAME',''],
            ['VARCHAR2','BUSINESS_NUMBER','UK'],['VARCHAR2','OWNER_NAME',''],
            ['VARCHAR2','APPROVAL_STATUS',''],['NUMBER','APPROVED_BY','FK']]},

  COUPON: { color:'#34d399', bg:'#061a10',
    fields:[['NUMBER','COUPON_NO','PK'],['VARCHAR2','COUPON_NAME',''],['VARCHAR2','COUPON_CODE','UK'],
            ['VARCHAR2','DISCOUNT_TYPE',''],['NUMBER','DISCOUNT_VALUE',''],
            ['NUMBER','ISSUED_BY','FK'],['DATE','START_DATE',''],
            ['DATE','END_DATE',''],['VARCHAR2','STATUS','']]},

  USER_COUPON: { color:'#c084fc', bg:'#160a28',
    fields:[['NUMBER','USER_COUPON_NO','PK'],['NUMBER','USER_NO','FK'],['NUMBER','COUPON_NO','FK'],
            ['NUMBER','EVENT_COUPON_NO','FK'],['DATE','ISSUED_AT',''],
            ['DATE','USED_AT',''],['DATE','EXPIRED_AT',''],['VARCHAR2','STATUS','']]},

  EVENT_COUPON: { color:'#22d3ee', bg:'#051c24',
    fields:[['NUMBER','EVENT_COUPON_NO','PK'],['NUMBER','EVENT_NO','FK'],['NUMBER','COUPON_NO','FK'],
            ['DATE','ISSUE_START_AT',''],['DATE','ISSUE_END_AT',''],
            ['NUMBER','ISSUE_LIMIT',''],['NUMBER','ISSUED_COUNT',''],['VARCHAR2','STATUS','']]},

  LODGINGS: { color:'#06b6d4', bg:'#041820',
    fields:[['NUMBER','LODGING_NO','PK'],['NUMBER','HOST_NO','FK'],['VARCHAR2','LODGING_NAME',''],
            ['VARCHAR2','LODGING_TYPE',''],['VARCHAR2','REGION',''],
            ['VARCHAR2','ADDRESS',''],['VARCHAR2','STATUS','']]},

  BOOKINGS: { color:'#f87171', bg:'#200808',
    fields:[['NUMBER','BOOKING_NO','PK'],['NUMBER','USER_NO','FK'],['NUMBER','LODGING_NO','FK'],
            ['NUMBER','USER_COUPON_NO','FK'],['DATE','CHECK_IN_DATE',''],
            ['DATE','CHECK_OUT_DATE',''],['NUMBER','GUEST_COUNT',''],
            ['NUMBER','TOTAL_PRICE',''],['VARCHAR2','STATUS','']]},

  WISHLIST: { color:'#93c5fd', bg:'#081428',
    fields:[['NUMBER','WISHLIST_NO','PK'],['NUMBER','USER_NO','FK'],['NUMBER','LODGING_NO','FK']]},

  LODGINGS_IMAGE: { color:'#fcd34d', bg:'#1a1600',
    fields:[['NUMBER','IMAGE_NO','PK'],['NUMBER','LODGING_NO','FK'],['VARCHAR2','IMAGE_URL',''],
            ['CHAR','IS_THUMBNAIL',''],['NUMBER','SORT_ORDER','']]},

  INQUIRY_ROOM: { color:'#fde68a', bg:'#1c1800',
    fields:[['NUMBER','INQUIRY_NO','PK'],['NUMBER','USER_NO','FK'],['VARCHAR2','TARGET_TYPE',''],
            ['VARCHAR2','INQUIRY_TYPE',''],['VARCHAR2','TITLE',''],
            ['NUMBER','ADMIN_USER_NO','FK'],['NUMBER','LODGING_NO','FK'],['VARCHAR2','STATUS','']]},

  REVIEW: { color:'#bef264', bg:'#121c00',
    fields:[['NUMBER','REVIEW_NO','PK'],['NUMBER','BOOKING_NO','FK'],['NUMBER','USER_NO','FK'],
            ['NUMBER','LODGING_NO','FK'],['NUMBER','RATING',''],['VARCHAR2','CONTENT','']]},

  INQUIRY_MESSAGE: { color:'#fda4af', bg:'#200610',
    fields:[['NUMBER','MESSAGE_NO','PK'],['NUMBER','INQUIRY_NO','FK'],['NUMBER','SENDER_USER_NO','FK'],
            ['VARCHAR2','SENDER_TYPE',''],['VARCHAR2','MESSAGE_CONTENT',''],['CHAR','READ_YN','']]},

  PAYMENT: { color:'#6ee7b7', bg:'#042016',
    fields:[['NUMBER','PAYMENT_NO','PK'],['NUMBER','BOOKING_NO','FK'],['NUMBER','ORDER_ID','UK'],
            ['VARCHAR2','PAYMENT_KEY','UK'],['VARCHAR2','PG_PROVIDER',''],
            ['NUMBER','PAYMENT_AMOUNT',''],['VARCHAR2','PAYMENT_METHOD',''],
            ['VARCHAR2','PAYMENT_STATUS','']]},

  MILEAGE_HISTORY: { color:'#818cf8', bg:'#0c0c28',
    fields:[['NUMBER','MILEAGE_HISTORY_NO','PK'],['NUMBER','USER_NO','FK'],['NUMBER','BOOKING_NO','FK'],
            ['NUMBER','PAYMENT_NO','FK'],['VARCHAR2','CHANGE_TYPE',''],['NUMBER','CHANGE_AMOUNT',''],
            ['NUMBER','BALANCE_AFTER',''],['VARCHAR2','STATUS','']]},
};

function th(name) { return HH + TABLES[name].fields.length * FH; }

// ──────────────────────────────────────────
// Layout: 5-column grid
// C0=50  C1=450  C2=850  C3=1250  C4=1650
// ──────────────────────────────────────────
const C0=50, C1=450, C2=850, C3=1250, C4=1650;
const R0=50, R1=450, R2=850, R3=1300, R4=1750, R5=2200, R6=2650;

const POS = {
  MEMBER_GRADE:      {x:C2, y:R0},
  PERSISTENT_LOGINS: {x:C4, y:R0},
  MEMBER_AUTH:       {x:C0, y:R1},
  USERS:             {x:C2, y:R1},
  EVENT:             {x:C0, y:R2},
  HOST_PROFILE:      {x:C1, y:R2},
  COUPON:            {x:C3, y:R2},
  USER_COUPON:       {x:C4, y:R2},
  EVENT_COUPON:      {x:C1, y:R3},
  LODGINGS:          {x:C2, y:R3},
  INQUIRY_ROOM:      {x:C3, y:R3},
  BOOKINGS:          {x:C4, y:R3},
  WISHLIST:          {x:C0, y:R4},
  LODGINGS_IMAGE:    {x:C1, y:R4},
  INQUIRY_MESSAGE:   {x:C3, y:R4},
  PAYMENT:           {x:C4, y:R4},
  REVIEW:            {x:C0, y:R5},
  MILEAGE_HISTORY:   {x:C4, y:R5},
};

function anc(name, side, frac=0.5) {
  const p = POS[name], h = th(name);
  const cx = p.x + TW/2, ry = p.y + HH + (h-HH)*frac;
  switch(side){
    case 'top':    return {x: p.x + TW*frac, y: p.y};
    case 'bottom': return {x: p.x + TW*frac, y: p.y + h};
    case 'left':   return {x: p.x,      y: ry};
    case 'right':  return {x: p.x + TW, y: ry};
  }
}

function route(s, ss, t, ts) {
  const hS = ss==='left'||ss==='right';
  const hT = ts==='left'||ts==='right';
  if (!hS && !hT) { // both vert exits
    const my = (s.y+t.y)/2;
    return `M${s.x} ${s.y} V${my} H${t.x} V${t.y}`;
  }
  if (hS && hT) { // both horiz exits
    const mx = (s.x+t.x)/2;
    return `M${s.x} ${s.y} H${mx} V${t.y} H${t.x}`;
  }
  if (hS && !hT) return `M${s.x} ${s.y} H${t.x} V${t.y}`; // horiz then vert
  if (!hS && hT)  return `M${s.x} ${s.y} V${t.y} H${t.x}`; // vert then horiz
}

// ──────────────────────────────────────────
// Connections
// ──────────────────────────────────────────
const CONNS = [
  // ── User / Auth ──────────────────────────────────────────────────────────
  {f:'MEMBER_GRADE',   fs:'bottom', ff:0.5,  t:'USERS',          ts:'top',    tf:0.5,  lbl:'assigns',   clr:'#a78bfa'},
  {f:'USERS',          fs:'left',   ff:0.35, t:'MEMBER_AUTH',    ts:'right',  tf:0.5,  lbl:'has',       clr:'#fb923c'},
  {f:'USERS',          fs:'right',  ff:0.25, t:'PERSISTENT_LOGINS',ts:'left', tf:0.5, lbl:'',          clr:'#fbbf24'},

  // ── Host & Lodging ───────────────────────────────────────────────────────
  {f:'USERS',          fs:'bottom', ff:0.38, t:'HOST_PROFILE',   ts:'top',    tf:0.5,  lbl:'owns',      clr:'#a78bfa'},
  {f:'HOST_PROFILE',   fs:'bottom', ff:0.5,  t:'LODGINGS',       ts:'top',    tf:0.4,  lbl:'linked_to', clr:'#06b6d4'},
  {f:'LODGINGS',       fs:'bottom', ff:0.5,  t:'LODGINGS_IMAGE', ts:'top',    tf:0.5,  lbl:'has',       clr:'#fcd34d'},
  {f:'LODGINGS',       fs:'left',   ff:0.6,  t:'WISHLIST',       ts:'right',  tf:0.5,  lbl:'',          clr:'#93c5fd'},

  // ── Event / Coupon ───────────────────────────────────────────────────────
  {f:'USERS',          fs:'left',   ff:0.55, t:'EVENT',          ts:'top',    tf:0.5,  lbl:'publishes', clr:'#f472b6'},
  {f:'USERS',          fs:'bottom', ff:0.62, t:'COUPON',         ts:'top',    tf:0.5,  lbl:'issues',    clr:'#34d399'},
  {f:'EVENT',          fs:'bottom', ff:0.5,  t:'EVENT_COUPON',   ts:'left',   tf:0.25, lbl:'saves',     clr:'#22d3ee'},
  {f:'COUPON',         fs:'bottom', ff:0.3,  t:'EVENT_COUPON',   ts:'right',  tf:0.25, lbl:'',          clr:'#22d3ee'},
  {f:'COUPON',         fs:'right',  ff:0.5,  t:'USER_COUPON',    ts:'left',   tf:0.35, lbl:'',          clr:'#c084fc'},
  {f:'EVENT_COUPON',   fs:'top',    ff:0.8,  t:'USER_COUPON',    ts:'bottom', tf:0.3,  lbl:'sends',     clr:'#c084fc'},
  {f:'USERS',          fs:'right',  ff:0.45, t:'USER_COUPON',    ts:'top',    tf:0.5,  lbl:'',          clr:'#c084fc'},

  // ── Booking ──────────────────────────────────────────────────────────────
  {f:'USERS',          fs:'right',  ff:0.65, t:'BOOKINGS',       ts:'top',    tf:0.3,  lbl:'books',     clr:'#f87171'},
  {f:'LODGINGS',       fs:'right',  ff:0.5,  t:'BOOKINGS',       ts:'left',   tf:0.35, lbl:'receives',  clr:'#f87171'},
  {f:'USER_COUPON',    fs:'bottom', ff:0.5,  t:'BOOKINGS',       ts:'top',    tf:0.7,  lbl:'applies',   clr:'#c084fc'},
  {f:'USERS',          fs:'left',   ff:0.75, t:'WISHLIST',       ts:'top',    tf:0.5,  lbl:'gets',      clr:'#93c5fd'},

  // ── Review ───────────────────────────────────────────────────────────────
  {f:'BOOKINGS',       fs:'bottom', ff:0.3,  t:'REVIEW',         ts:'right',  tf:0.4,  lbl:'',          clr:'#bef264'},
  {f:'LODGINGS',       fs:'bottom', ff:0.2,  t:'REVIEW',         ts:'right',  tf:0.6,  lbl:'',          clr:'#bef264'},
  {f:'USERS',          fs:'left',   ff:0.88, t:'REVIEW',         ts:'top',    tf:0.5,  lbl:'writes',    clr:'#bef264'},

  // ── Inquiry ──────────────────────────────────────────────────────────────
  {f:'LODGINGS',       fs:'right',  ff:0.7,  t:'INQUIRY_ROOM',   ts:'left',   tf:0.65, lbl:'relates_to',clr:'#fde68a'},
  {f:'USERS',          fs:'right',  ff:0.75, t:'INQUIRY_ROOM',   ts:'top',    tf:0.35, lbl:'',          clr:'#fde68a'},
  {f:'INQUIRY_ROOM',   fs:'bottom', ff:0.5,  t:'INQUIRY_MESSAGE',ts:'top',    tf:0.5,  lbl:'contains',  clr:'#fda4af'},

  // ── Payment & Mileage ────────────────────────────────────────────────────
  {f:'BOOKINGS',       fs:'bottom', ff:0.55, t:'PAYMENT',        ts:'top',    tf:0.45, lbl:'paid_by',   clr:'#6ee7b7'},
  {f:'BOOKINGS',       fs:'bottom', ff:0.7,  t:'MILEAGE_HISTORY',ts:'top',    tf:0.35, lbl:'',          clr:'#818cf8'},
  {f:'PAYMENT',        fs:'bottom', ff:0.5,  t:'MILEAGE_HISTORY',ts:'top',    tf:0.65, lbl:'affects',   clr:'#818cf8'},
  {f:'USERS',          fs:'right',  ff:0.85, t:'MILEAGE_HISTORY',ts:'top',    tf:0.2,  lbl:'',          clr:'#818cf8'},
];

// ──────────────────────────────────────────
// Render
// ──────────────────────────────────────────
const svg = document.getElementById('erd');
const CW = 2050, CH = 2750;
svg.setAttribute('width',  '100%');
svg.setAttribute('height', 'auto');
svg.style.maxWidth = CW + 'px';
svg.setAttribute('viewBox',`0 0 ${CW} ${CH}`);

// ── Defs ──────────────────────────────────
const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
defs.innerHTML = `
  <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
    <path d="M0,0 L7,3 L0,6 Z" fill="#556" opacity="0.9"/>
  </marker>
  <marker id="crow" markerWidth="10" markerHeight="8" refX="1" refY="4" orient="auto">
    <line x1="9" y1="0" x2="1" y2="4" stroke="#556" stroke-width="1.2"/>
    <line x1="9" y1="8" x2="1" y2="4" stroke="#556" stroke-width="1.2"/>
    <line x1="9" y1="0" x2="9" y2="8" stroke="#556" stroke-width="1.2"/>
    <line x1="6" y1="0" x2="6" y2="8" stroke="#556" stroke-width="1.2"/>
  </marker>
`;
svg.appendChild(defs);

// ── Grid bg lines ─────────────────────────
const bgG = document.createElementNS('http://www.w3.org/2000/svg','g');
bgG.setAttribute('opacity','0.035');
for(let x=0;x<=CW;x+=40){
  const l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',x);l.setAttribute('y1',0);
  l.setAttribute('x2',x);l.setAttribute('y2',CH);
  l.setAttribute('stroke','#8b949e');l.setAttribute('stroke-width','0.5');
  bgG.appendChild(l);
}
for(let y=0;y<=CH;y+=40){
  const l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',0);l.setAttribute('y1',y);
  l.setAttribute('x2',CW);l.setAttribute('y2',y);
  l.setAttribute('stroke','#8b949e');l.setAttribute('stroke-width','0.5');
  bgG.appendChild(l);
}
svg.appendChild(bgG);

// ── Connections ───────────────────────────
const connG = document.createElementNS('http://www.w3.org/2000/svg','g');
for(const c of CONNS){
  const s = anc(c.f, c.fs, c.ff);
  const t = anc(c.t, c.ts, c.tf);
  const d = route(s, c.fs, t, c.ts);

  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', d);
  path.setAttribute('fill','none');
  path.setAttribute('stroke', c.clr);
  path.setAttribute('stroke-width','1.4');
  path.setAttribute('stroke-opacity','0.55');
  path.setAttribute('marker-end','url(#arr)');
  connG.appendChild(path);

  if(c.lbl){
    // Place label at midpoint of path
    const mx = (s.x+t.x)/2, my = (s.y+t.y)/2;
    const bg = document.createElementNS('http://www.w3.org/2000/svg','rect');
    const tw_ = c.lbl.length*5.5+6;
    bg.setAttribute('x', mx-tw_/2);
    bg.setAttribute('y', my-9);
    bg.setAttribute('width',tw_);
    bg.setAttribute('height',12);
    bg.setAttribute('rx',3);
    bg.setAttribute('fill','#0d1117');
    bg.setAttribute('opacity','0.85');
    connG.appendChild(bg);

    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x', mx);
    txt.setAttribute('y', my);
    txt.setAttribute('text-anchor','middle');
    txt.setAttribute('font-size','14');
    txt.setAttribute('font-family','Courier New, monospace');
    txt.setAttribute('fill', c.clr);
    txt.setAttribute('opacity','1');
    txt.textContent = c.lbl;
    connG.appendChild(txt);
  }
}
svg.appendChild(connG);

// ── Tables ────────────────────────────────
const tabG = document.createElementNS('http://www.w3.org/2000/svg','g');

for(const [name, tbl] of Object.entries(TABLES)){
  const p = POS[name];
  if(!p) continue;
  const h = th(name);
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('transform',`translate(${p.x},${p.y})`);

  // Drop shadow
  const sh = document.createElementNS('http://www.w3.org/2000/svg','rect');
  sh.setAttribute('x',3);sh.setAttribute('y',4);
  sh.setAttribute('width',TW);sh.setAttribute('height',h);
  sh.setAttribute('rx',5);sh.setAttribute('fill','#000');sh.setAttribute('opacity','0.5');
  g.appendChild(sh);

  // Body
  const body = document.createElementNS('http://www.w3.org/2000/svg','rect');
  body.setAttribute('width',TW);body.setAttribute('height',h);
  body.setAttribute('rx',5);
  body.setAttribute('fill',tbl.bg);
  body.setAttribute('stroke',tbl.color);body.setAttribute('stroke-width','1.5');
  g.appendChild(body);

  // Header fill
  const hdr = document.createElementNS('http://www.w3.org/2000/svg','rect');
  hdr.setAttribute('width',TW);hdr.setAttribute('height',HH);
  hdr.setAttribute('rx',5);hdr.setAttribute('fill',tbl.color);hdr.setAttribute('opacity','0.9');
  g.appendChild(hdr);
  // flatten header bottom corners
  const hdrFix = document.createElementNS('http://www.w3.org/2000/svg','rect');
  hdrFix.setAttribute('y',HH-5);hdrFix.setAttribute('width',TW);hdrFix.setAttribute('height',5);
  hdrFix.setAttribute('fill',tbl.color);hdrFix.setAttribute('opacity','0.9');
  g.appendChild(hdrFix);

  // Header label
  const htxt = document.createElementNS('http://www.w3.org/2000/svg','text');
  htxt.setAttribute('x',TW/2);htxt.setAttribute('y',HH/2+8);
  htxt.setAttribute('text-anchor','middle');
  htxt.setAttribute('font-size','18');htxt.setAttribute('font-weight','bold');
  htxt.setAttribute('font-family','Courier New, monospace');
  htxt.setAttribute('fill','#06080a');
  htxt.setAttribute('letter-spacing','0.5');
  htxt.textContent = name;
  g.appendChild(htxt);

  // Fields
  tbl.fields.forEach(([type,fname,key],i)=>{
    const fy = HH + i*FH;

    // Separator
    if(i>0){
      const sep = document.createElementNS('http://www.w3.org/2000/svg','line');
      sep.setAttribute('x1',0);sep.setAttribute('y1',fy);
      sep.setAttribute('x2',TW);sep.setAttribute('y2',fy);
      sep.setAttribute('stroke','#ffffff0a');sep.setAttribute('stroke-width','0.5');
      g.appendChild(sep);
    }

    // Row highlight for PK
    if(key==='PK'){
      const rb = document.createElementNS('http://www.w3.org/2000/svg','rect');
      rb.setAttribute('y',fy);rb.setAttribute('width',TW);rb.setAttribute('height',FH);
      rb.setAttribute('fill','#ffffff07');
      g.appendChild(rb);
    }

    // Type label
    const ty_txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    ty_txt.setAttribute('x',PAD);ty_txt.setAttribute('y',fy+FH/2+6);
    ty_txt.setAttribute('font-size','12');ty_txt.setAttribute('font-family','Courier New, monospace');
    ty_txt.setAttribute('fill','#3d4f66');
    ty_txt.textContent = type;
    g.appendChild(ty_txt);

    // Field name
    const fn_txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    fn_txt.setAttribute('x',PAD+85);fn_txt.setAttribute('y',fy+FH/2+6);
    fn_txt.setAttribute('font-size','16');fn_txt.setAttribute('font-family','Courier New, monospace');
    fn_txt.setAttribute('fill', key==='PK'?'#ffd700':key==='FK'?'#7dd3fc':key==='UK'?'#86efac':'#c0cdd8');
    fn_txt.textContent = fname;
    g.appendChild(fn_txt);

    // Key badge
    if(key){
      const kclr = key==='PK'?'#ffd700':key==='FK'?'#7dd3fc':'#86efac';
      const kb = document.createElementNS('http://www.w3.org/2000/svg','rect');
      const kw=18;
      kb.setAttribute('x',TW-kw-3);kb.setAttribute('y',fy+3);
